<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Roller Coaster Audit — AmusementRating</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F4F5F7;--card:#fff;--border:#E5E7EB;--text:#374151;--dim:#9CA3AF;--dark:#0A0F1A;--dark2:#12141C;--dark3:#1A1F2E;--dark4:#242938;--ar:#22D87C;--ar2:#1BC06E;--ar-dim:rgba(34,216,124,.12);--green:#059669;--greenbg:#ECFDF5;--greenbd:#86EFAC;--mono:'Space Mono',monospace;--sans:'Sora',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--sans);background:var(--bg);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}button,input,textarea{font-family:var(--sans)}input:focus,textarea:focus{outline:none;border-color:var(--ar)!important}
.mono{font-family:var(--mono)}
.bdg{display:inline-block;font-family:var(--mono);font-weight:700;letter-spacing:.06em;line-height:1.6;border-radius:4px;font-size:9.5px;padding:1px 7px}
.bdg-O{color:#0D9488;background:#CCFBF1;border:1px solid #5EEAD4}.bdg-S{color:#DC2626;background:#FEE2E2;border:1px solid #FCA5A5}.bdg-G{color:#2563EB;background:#DBEAFE;border:1px solid #93C5FD}.bdg-F{color:#B45309;background:#FEF3C7;border:1px solid #FCD34D}
.scores{display:flex;gap:5px;margin-top:8px}.sb{font-family:var(--mono);width:38px;height:34px;border-radius:7px;cursor:pointer;font-weight:700;font-size:13px;border:1.5px solid var(--border);background:#FAFAFA;color:var(--dim);transition:all .15s}.sb.on{color:#fff;border-width:2.5px}.s1.on{background:#DC2626;border-color:#DC2626}.s2.on{background:#EA580C;border-color:#EA580C}.s3.on{background:#CA8A04;border-color:#CA8A04}.s4.on{background:#16A34A;border-color:#16A34A}.s5.on{background:#059669;border-color:#059669}
.wrap{max-width:480px;margin:0 auto;min-height:100vh}.body{padding:14px 16px 40px}

/* ═══ UNIFIED STICKY HEADER ═══ */
.shdr{position:sticky;top:0;z-index:100;max-height:25vh;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--dark);scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.shdr::-webkit-scrollbar{width:3px}.shdr::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}.shdr::-webkit-scrollbar-track{background:transparent}
.shdr-top{padding:10px 14px 0}
.shdr-mid{padding:6px 14px}
.shdr-bot{padding:0 14px 10px}
.shdr-divider{height:1px;background:rgba(255,255,255,.06);margin:0 14px}

/* Progress bar */
.pbar{height:3px;border-radius:2px;background:rgba(255,255,255,.08);margin:8px 0 0}.pfill{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.34,1.56,.64,1)}

/* GPS in header */
.hdr-gps{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;width:100%;text-align:left;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);transition:all .15s}.hdr-gps:hover{background:rgba(255,255,255,.06)}.hdr-gps.on{border-color:rgba(34,216,124,.3);background:rgba(34,216,124,.08)}

/* Tags in header */
.hdr-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;color:#94A3B8;background:rgba(255,255,255,.06);font-weight:500}

/* Legend in header */
.hdr-leg{margin:4px 0 0;padding:8px 10px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.leg-row{display:flex;gap:7px;align-items:center;margin-bottom:2px}.leg-row:last-child{margin-bottom:0}
.leg-dot{width:18px;height:18px;border-radius:4px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:var(--mono);flex-shrink:0}

/* Pillar cells in header */
.hdr-pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.hdr-pcell{padding:6px 8px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);text-align:center;position:relative;overflow:hidden}
.hdr-pcell-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.06)}.hdr-pcell-fill{height:100%;border-radius:0 0 2px 2px;transition:width .4s}

/* Score guide toggle */
.leg-toggle{padding:0;border:none;background:none;cursor:pointer;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.06em;color:#64748B;display:flex;align-items:center;gap:5px;transition:color .15s}.leg-toggle:hover{color:#94A3B8}

/* ═══ PHASE CARDS ═══ */
.phase{margin-bottom:10px;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--card)}.phase.complete{border:1.5px solid var(--greenbd)}.phase-hdr{width:100%;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;border:none;cursor:pointer;font-family:var(--sans);background:#FAFAFA}.phase.complete .phase-hdr{background:#F0FDF4}.phase-body{padding:6px 14px 10px}.item{padding:10px 0;border-bottom:1px solid #F5F5F5}.item:last-child{border-bottom:none}

/* GPS full (for END block) */
.gps{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;width:100%;text-align:left;cursor:pointer;border:2px dashed var(--border);background:var(--card)}.gps.on{border:1.5px solid var(--green);background:var(--greenbg)}
.photo-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;font-size:11px;border-radius:6px;cursor:pointer;font-weight:600;border:1.5px dashed var(--border);background:var(--card);color:var(--dim)}.photo-btn.on{border:1.5px solid var(--green);background:var(--greenbg);color:var(--green)}
.note-btn{margin-top:4px;padding:2px 8px;font-size:10.5px;color:var(--dim);background:none;border:1px dashed #D1D5DB;border-radius:4px;cursor:pointer}.note-area{margin-top:6px;width:100%;padding:8px 10px;font-size:12.5px;border:1.5px solid var(--border);border-radius:7px;resize:vertical;line-height:1.5;color:var(--text);background:#FAFAFA}
.submit-btn{width:100%;padding:15px;border-radius:12px;border:none;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s}.submit-on{background:var(--ar);color:#0A0C10;box-shadow:0 6px 20px rgba(34,216,124,.25)}.submit-off{background:#E5E7EB;color:var(--dim);cursor:default}

/* Data capture choice pills */
.dc-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.dc-pill{font-family:var(--mono);font-size:11px;font-weight:700;padding:6px 10px;border-radius:7px;border:1.5px solid var(--border);background:#FAFAFA;color:var(--dim);cursor:pointer;transition:all .12s;white-space:nowrap;text-align:center;min-width:36px}
.dc-pill:active{transform:scale(.95)}.dc-pill.on{color:#065F46;background:#ECFDF5;border-color:#86EFAC}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:flex-end;justify-content:center}.modal{background:#fff;border-radius:16px 16px 0 0;max-width:480px;width:100%;max-height:85vh;overflow:auto;padding:20px 18px 28px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
var CHECKLIST_TITLE="Roller Coaster";
var CHECKLIST_ICON="🎢";
var CHECKLIST_ID="rc";
var PHASES=[
{n:"Approach",ph:1,items:[{t:"Ride signage visible and legible from 50+ ft",p:"G"},{t:"Height requirement posted clearly at approach",p:"S"},{t:"Wait time posted and appears accurate",p:"O"},{t:"Pathway to entrance clear, ADA-accessible",p:"F"}],data:[{k:"posted_wait",l:"Posted Wait Time",icon:"⏱️",type:"choice",opts:["Not posted","0 min","15 min","30 min","45 min","60 min","75 min","90 min","120+ min"]},{k:"queue_length_est",l:"Est. Queue Length",icon:"👥",type:"choice",opts:["Empty","1–10","11–25","26–50","51–100","100–200","200+"]}]},
{n:"Queue Entry",items:[{t:"Ride rules and restrictions posted at queue entrance",p:"S"},{t:"Loose article policy clearly communicated",p:"G"},{t:"Entry point staffed or monitored",p:"O"},{t:"Queue entrance area clean and maintained",p:"F"}]},
{n:"Queue Experience",items:[{t:"Queue moves at consistent pace — no unexplained stops >3 min",p:"O"},{t:"Shade, fans, or misting available in outdoor sections",p:"G"},{t:"Railings and barriers secure, no sharp edges",p:"S"},{t:"Queue area free of trash, graffiti, standing water",p:"F"}],data:[{k:"line_jumping",l:"Line Jumping Witnessed",icon:"🚶",type:"choice",opts:["0","1–2","3–5","6+"]},{k:"line_leaving",l:"People Leaving Line",icon:"👋",type:"choice",opts:["0","1–2","3–5","6–10","10+"]}]},
{n:"Station / Loading",ph:1,items:[{t:"Grouper efficiently assigns rows, minimizes empty seats",p:"O"},{t:"Operator restraint checks thorough (belt + bar, every guest)",p:"S"},{t:"Verbal safety spiel delivered clearly before dispatch",p:"S"},{t:"Operator engages guests positively — not robotic",p:"G"},{t:"Station platform clean, non-slip surface intact",p:"F"}],data:[{k:"workers_platform",l:"Employees on Platform",icon:"👷",type:"choice",opts:["1","2","3","4","5","6+"]},{k:"workers_training",l:"Employees Engaged in Training",icon:"🎓",type:"choice",opts:["0","1","2","3+"]},{k:"trains_running",l:"Trains Running",icon:"🚂",type:"choice",opts:["1","2","3","4+"]},{k:"oos_seats",l:"Total Out of Service Seats",icon:"💺",type:"choice",opts:["0","1–2","3–5","6+"]},{k:"empty_seats",l:"Empty Seats per Dispatch",icon:"🪑",type:"choice",opts:["0","1–2","3–5","6–10","Half+"]}]},
{n:"Dispatch",items:[{t:"All-clear procedure visible (thumbs-up, call-out, panel check)",p:"S"},{t:"Dispatch interval consistent — no excessive stacking",p:"O"},{t:"Gates and airgates function properly",p:"F"}],data:[{k:"stacking_witnessed",l:"Times Trains Fully Stacked",icon:"🚦",type:"choice",opts:["0","1","2","3","4","5+"]}]},
{n:"Ride",items:[{t:"Ride operates smoothly — no abnormal sounds or jolts",p:"S"},{t:"On-ride theming and effects functioning",p:"G"},{t:"Track/structure visible portions well-maintained",p:"F"}]},
{n:"Unload",items:[{t:"Operator confirms full stop before releasing restraints",p:"S"},{t:"Clear directional signage for exit",p:"G"},{t:"Operator thanks guests or provides positive send-off",p:"G"},{t:"Unload platform clean and dry",p:"F"}]},
{n:"Exit",ph:1,items:[{t:"Exit path clearly marked — no dead-ends",p:"G"},{t:"On-ride photo/retail does not block egress",p:"S"},{t:"Exit area clean and maintained",p:"F"},{t:"Re-ride option clearly signed (if offered)",p:"O"}]}
];
</script>
<script>
var P={O:{l:"OPS",c:"#0D9488",bg:"rgba(13,148,136,.15)",bc:"rgba(13,148,136,.35)"},S:{l:"SAFE",c:"#DC2626",bg:"rgba(220,38,38,.15)",bc:"rgba(220,38,38,.35)"},G:{l:"GUEST",c:"#2563EB",bg:"rgba(37,99,235,.15)",bc:"rgba(37,99,235,.35)"},F:{l:"FACIL",c:"#B45309",bg:"rgba(180,83,9,.15)",bc:"rgba(180,83,9,.35)"}};
var AN=[{n:1,l:"Critical",d:"Safety hazard or total failure",c:"#DC2626"},{n:2,l:"Poor",d:"Below minimum standard",c:"#EA580C"},{n:3,l:"Acceptable",d:"Meets baseline expectations",c:"#CA8A04"},{n:4,l:"Good",d:"Above average",c:"#16A34A"},{n:5,l:"Excellent",d:"Best-in-class",c:"#059669"}];

var params=new URLSearchParams(window.location.search);
var rideName=params.get('ride')||'';
var meta={park:params.get('park')||'',auditor:localStorage.getItem('ar_username')||''};
var scores={},notes={},photos={},expanded={},showLeg=false,dataCapture={};

function setScore(k,v){scores[k]=(scores[k]===v)?null:v;render();}
function setData(k,v){dataCapture[k]=(dataCapture[k]===v)?null:v;render();}
function pickOpt(k,idx){var opt=null;PHASES.forEach(function(p){if(p.data)p.data.forEach(function(d){if(d.k===k&&d.opts)opt=d.opts[idx];});});setData(k,opt);}
function setPhoto(k,v){photos[k]=v;render();}
function captGPS(field){var now=new Date();var ts=now.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});meta[field+'Time']=ts+' · GPS pending';render();if(navigator.geolocation){navigator.geolocation.getCurrentPosition(function(pos){meta[field+'Time']=ts+' · '+pos.coords.latitude.toFixed(4)+'°, '+pos.coords.longitude.toFixed(4)+'°';meta[field+'Lat']=pos.coords.latitude;meta[field+'Lng']=pos.coords.longitude;render();},function(){meta[field+'Time']=ts+' · GPS unavailable';render();},{timeout:5000});}}

function bdg(p){return'<span class="bdg bdg-'+p+'">'+P[p].l+'</span>';}
function counted(){var total=0,scored=0;PHASES.forEach(function(p,pi){p.items.forEach(function(_,ii){total++;if(scores[pi+'-'+ii]!=null)scored++;});});return{total:total,scored:scored,pct:total?Math.round(scored/total*100):0};}
function scoreBtns(key){return'<div class="scores">'+AN.map(function(a){return'<button class="sb s'+a.n+(scores[key]===a.n?' on':'')+'" title="'+a.l+'" onclick="setScore(\''+key+'\','+a.n+')">'+a.n+'</button>';}).join('')+'</div>';}
function gpsBlock(label,field,icon){var v=meta[field+'Time'];return'<button class="gps'+(v?' on':'')+'" onclick="captGPS(\''+field+'\')"><span style="font-size:20px">'+(v?'📍':icon)+'</span><div style="flex:1"><div style="font-size:11.5px;font-weight:700;color:'+(v?'var(--green)':'#6B7280')+'">'+label+'</div><div class="mono" style="font-size:10.5px;color:'+(v?'#065F46':'var(--dim)')+';margin-top:1px">'+(v||'Tap to capture GPS + timestamp')+'</div></div></button>';}
function noteField(key){var v=notes[key];if(v)return'<textarea class="note-area" onchange="notes[\''+key+'\']=this.value" rows="2">'+v+'</textarea>';return'<button class="note-btn" onclick="this.outerHTML=\'<textarea class=\\\'note-area\\\' onchange=\\\'notes[\\\"'+key+'\\\"]=this.value\\\' rows=\\\'2\\\' placeholder=\\\'Observation note…\\\'></textarea>\'">+ note</button>';}
function photoBtn(idx){var on=photos[idx];return'<button class="photo-btn'+(on?' on':'')+'" onclick="setPhoto('+idx+','+(on?'false':'true')+')">'+(on?'✓ 📷 Photo captured':'📷 Add photo')+'</button>';}

// ═══ XP GAMIFICATION ═══
var XP={base:50,perDataField:5,allDataBonus:25,photoBonus:3,gpsBonus:10,perfectBonus:50,noteBonus:2};
function xpCalc(){
  var c=counted();var xp=0;var breakdown=[];
  // Base XP: 50 for submitting any audit
  if(c.scored>0){xp+=XP.base;breakdown.push({label:'Audit submitted',val:XP.base});}
  // Data capture: 5 XP per field filled
  var totalData=0;var filledData=0;
  PHASES.forEach(function(p){if(p.data)p.data.forEach(function(d){totalData++;if(dataCapture[d.k]!=null&&dataCapture[d.k]!=='')filledData++;});});
  if(filledData>0){var dxp=filledData*XP.perDataField;xp+=dxp;breakdown.push({label:filledData+'/'+totalData+' data fields',val:dxp});}
  // All data bonus: 25 XP if every data field filled
  if(totalData>0&&filledData===totalData){xp+=XP.allDataBonus;breakdown.push({label:'All data captured bonus',val:XP.allDataBonus,bonus:true});}
  // Photo evidence: 3 XP per photo
  var photoCount=Object.keys(photos).filter(function(k){return photos[k];}).length;
  if(photoCount>0){var pxp=photoCount*XP.photoBonus;xp+=pxp;breakdown.push({label:photoCount+' photo'+(photoCount>1?'s':''),val:pxp});}
  // GPS: 10 XP if both start+end captured
  var gpsCount=(meta.startTime?1:0)+(meta.endTime?1:0);
  if(gpsCount===2){xp+=XP.gpsBonus;breakdown.push({label:'GPS start + end',val:XP.gpsBonus});}
  // Notes: 2 XP per note
  var noteCount=Object.keys(notes).filter(function(k){return notes[k]&&notes[k].trim();}).length;
  if(noteCount>0){var nxp=noteCount*XP.noteBonus;xp+=nxp;breakdown.push({label:noteCount+' note'+(noteCount>1?'s':''),val:nxp});}
  // Perfect audit: 50 XP bonus if 100% scored + all data + both GPS
  if(c.pct===100&&totalData>0&&filledData===totalData&&gpsCount===2){xp+=XP.perfectBonus;breakdown.push({label:'Perfect audit bonus',val:XP.perfectBonus,bonus:true});}
  return{total:xp,breakdown:breakdown,filledData:filledData,totalData:totalData};
}

function dataFields(phase){if(!phase.data||!phase.data.length)return'';var filled=phase.data.filter(function(d){return dataCapture[d.k]!=null&&dataCapture[d.k]!=='';}).length;var total=phase.data.length;var allDone=filled===total;var h='<div style="margin-top:10px;padding:12px;border-radius:10px;background:'+(allDone?'#F0FDF4':'#FFFBEB')+';border:1px solid '+(allDone?'#86EFAC':'#FDE68A')+';transition:all .2s"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:'+(allDone?'#065F46':'#92400E')+';letter-spacing:.06em">📊 DATA CAPTURE</div><div style="display:flex;align-items:center;gap:6px"><span class="mono" style="font-size:9px;color:'+(allDone?'#059669':'#B45309')+';font-weight:700">'+filled+'/'+total+'</span><span style="font-size:9px;color:'+(allDone?'#059669':'#D97706')+';font-weight:700">⚡ '+(allDone?'+'+(total*XP.perDataField+XP.allDataBonus)+' XP':'+'+(XP.perDataField)+' XP each')+'</span></div></div>';
  phase.data.forEach(function(d){
    var v=dataCapture[d.k];var isFilled=v!=null&&v!=='';
    h+='<div style="margin-bottom:10px"><label style="font-size:10px;font-weight:600;color:#374151;display:flex;align-items:center;gap:4px;margin-bottom:4px"><span style="font-size:13px">'+d.icon+'</span>'+d.l+(isFilled?'<span style="font-size:8px;color:#059669;font-weight:700;margin-left:2px">✓</span>':'')+'</label>';
    if(d.type==='choice'){
      h+='<div class="dc-pills">';
      d.opts.forEach(function(opt,oi){var on=v===opt;h+='<button class="dc-pill'+(on?' on':'')+'" onclick="pickOpt(\''+d.k+'\','+oi+')">'+opt+'</button>';});
      h+='</div>';
    }else{
      h+='<div style="display:flex;align-items:center;gap:4px"><input type="number" inputmode="numeric" value="'+(v||'')+'" placeholder="—" onchange="dataCapture[\''+d.k+'\']=this.value?parseInt(this.value):null;render()" style="width:100%;max-width:120px;padding:8px 10px;border:1.5px solid '+(isFilled?'#86EFAC':'#D1D5DB')+';border-radius:7px;font-family:var(--mono);font-size:14px;font-weight:700;text-align:center;background:'+(isFilled?'#F0FDF4':'#fff')+'">'+(d.u?'<span style="font-size:10px;color:var(--dim);white-space:nowrap">'+d.u+'</span>':'')+'</div>';
    }
    h+='</div>';
  });
  h+='</div>';return h;}

function render(){
  var c=counted();
  var pd={O:[],S:[],G:[],F:[]};
  PHASES.forEach(function(p,pi){p.items.forEach(function(it,ii){var v=scores[pi+'-'+ii];if(v!=null)pd[it.p].push(v);});});

  // ═══════════════════════════════════════════════
  // UNIFIED DARK STICKY HEADER
  // ═══════════════════════════════════════════════
  var h='<div class="shdr">';

  // ── ROW 1: Back + Title + Percentage ──
  h+='<div class="shdr-top">';
  h+='<div style="display:flex;align-items:center;gap:10px">';
  h+='<a href="profile.html" style="color:#64748B;font-size:18px;text-decoration:none;padding:2px 4px;border-radius:6px;transition:background .15s" onmouseover="this.style.background=\'rgba(255,255,255,.06)\'" onmouseout="this.style.background=\'none\'">←</a>';
  h+='<div style="flex:1">';
  h+='<div style="display:flex;align-items:center;gap:8px"><span style="font-size:16px">'+CHECKLIST_ICON+'</span><span style="font-size:14px;font-weight:700;color:#F1F5F9;letter-spacing:-.01em">'+CHECKLIST_TITLE+'</span></div>';
  h+='<div style="font-size:10px;color:#475569;margin-top:2px">'+PHASES.length+' phases · '+c.total+' items</div>';
  h+='</div>';
  // Percentage ring
  var ringPct=c.pct;var ringColor=ringPct===100?'#22D87C':'#22D87C';var ringTrail='rgba(255,255,255,.08)';var circumf=2*Math.PI*16;var dashOff=circumf-(ringPct/100)*circumf;
  h+='<div style="position:relative;width:42px;height:42px;flex-shrink:0">';
  h+='<svg width="42" height="42" viewBox="0 0 42 42"><circle cx="21" cy="21" r="16" fill="none" stroke="'+ringTrail+'" stroke-width="3"/><circle cx="21" cy="21" r="16" fill="none" stroke="'+ringColor+'" stroke-width="3" stroke-linecap="round" stroke-dasharray="'+circumf+'" stroke-dashoffset="'+dashOff+'" transform="rotate(-90 21 21)" style="transition:stroke-dashoffset .5s cubic-bezier(.34,1.56,.64,1)"/></svg>';
  h+='<span class="mono" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:'+(ringPct===100?'#22D87C':'#E2E8F0')+'">'+ringPct+'</span>';
  h+='</div>';
  h+='</div>';

  // Progress bar
  h+='<div class="pbar"><div class="pfill" style="width:'+c.pct+'%;background:'+(c.pct===100?'#16A34A':'var(--ar)')+'"></div></div>';
  h+='</div>'; // end shdr-top

  // ── ROW 2: Tags + GPS ──
  h+='<div class="shdr-mid">';
  // Tags inline with GPS
  h+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px">';
  h+='<span class="hdr-tag" style="color:#E2E8F0;background:rgba(255,255,255,.1);font-weight:700">'+(rideName||CHECKLIST_TITLE)+'</span>';
  if(meta.park)h+='<span class="hdr-tag">📍 '+meta.park+'</span>';
  if(meta.auditor)h+='<span class="hdr-tag">👤 '+meta.auditor+'</span>';
  h+='</div>';
  // GPS Start - compact inline
  var gv=meta['startTime'];
  h+='<button class="hdr-gps'+(gv?' on':'')+'" onclick="captGPS(\'start\')">';
  h+='<span style="font-size:13px">'+(gv?'📍':'🟢')+'</span>';
  h+='<div style="flex:1"><div style="font-size:10px;font-weight:700;color:'+(gv?'#22D87C':'#64748B')+';letter-spacing:.02em">START</div>';
  h+='<div class="mono" style="font-size:9px;color:'+(gv?'rgba(34,216,124,.7)':'#475569')+';margin-top:1px">'+(gv||'Tap to capture GPS + timestamp')+'</div></div></button>';
  h+='</div>';

  h+='<div class="shdr-divider"></div>';

  // ── ROW 3: Pillar scores (always visible) + Legend toggle ──
  h+='<div class="shdr-bot">';

  // Legend toggle
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">';
  h+='<span style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#475569">Pillars</span>';
  h+='<div style="display:flex;align-items:center;gap:10px">';
  h+='<span class="mono" style="font-size:9px;color:#475569">'+c.scored+'/'+c.total+'</span>';
  h+='<button class="leg-toggle" onclick="showLeg=!showLeg;render()">'+(showLeg?'▾':'▸')+' Guide</button>';
  h+='</div></div>';

  // Legend (collapsed by default)
  if(showLeg){
    h+='<div class="hdr-leg">';
    AN.forEach(function(a){h+='<div class="leg-row"><span class="leg-dot" style="background:'+a.c+'">'+a.n+'</span><span style="font-size:10px;color:#94A3B8"><strong style="color:#CBD5E1">'+a.l+'</strong> — '+a.d+'</span></div>';});
    h+='</div>';
  }

  // 4 pillar cells - inline row
  h+='<div class="hdr-pillars">';
  ['O','S','G','F'].forEach(function(code){
    var arr=pd[code];var avg=arr.length?arr.reduce(function(a,b){return a+b;},0)/arr.length:0;
    var pt=PHASES.reduce(function(s,p){return s+p.items.filter(function(i){return i.p===code;}).length;},0);
    var bc=avg>=4?'#059669':avg>=3?'#CA8A04':avg>0?'#DC2626':'#334155';
    h+='<div class="hdr-pcell" style="border-color:'+P[code].bc+';background:'+P[code].bg+'">';
    h+='<div class="mono" style="font-size:8px;font-weight:700;color:'+P[code].c+';letter-spacing:.08em;opacity:.85">'+P[code].l+'</div>';
    h+='<div class="mono" style="font-size:18px;font-weight:700;color:'+(arr.length?'#F1F5F9':'#334155')+';line-height:1.2;margin:1px 0">'+(arr.length?avg.toFixed(1):'—')+'</div>';
    h+='<div class="mono" style="font-size:8px;color:#475569">'+arr.length+'/'+pt+'</div>';
    h+='<div class="hdr-pcell-bar"><div class="hdr-pcell-fill" style="width:'+(avg*20)+'%;background:'+bc+'"></div></div>';
    h+='</div>';
  });
  h+='</div>';

  h+='</div>'; // end shdr-bot
  h+='</div>'; // end shdr

  // ═══════════════════════════════════════════════
  // SCROLLABLE BODY
  // ═══════════════════════════════════════════════
  h+='<div class="body">';

  PHASES.forEach(function(phase,pi){
    var done=phase.items.filter(function(_,i){return scores[pi+'-'+i]!=null;}).length;
    var comp=done===phase.items.length;var isExp=expanded[pi]!==false;
    h+='<div class="phase'+(comp?' complete':'')+'"><button class="phase-hdr" onclick="expanded['+pi+']='+(isExp?'false':'true')+';render()"><div style="display:flex;align-items:center;gap:8px;text-align:left"><span style="font-size:11px;color:var(--dim);transform:rotate('+(isExp?'0':'-90')+'deg);transition:transform .15s">▾</span>'+(comp?'<span style="font-size:13px">✓</span>':'')+'<span style="font-weight:700;font-size:13.5px;color:#111827">'+phase.n+'</span>'+(phase.ph?'<span style="font-size:10px">📷</span>':'')+'</div><span class="mono" style="font-size:11px;font-weight:600;color:'+(comp?'#16A34A':'var(--dim)')+'">'+done+'/'+phase.items.length+'</span></button>';
    if(isExp){h+='<div class="phase-body">';phase.items.forEach(function(item,i){var k=pi+'-'+i;h+='<div class="item"><div style="display:flex;gap:8px;align-items:flex-start">'+bdg(item.p)+'<span style="font-size:12.5px;color:var(--text);line-height:1.55;flex:1">'+item.t+'</span></div>'+scoreBtns(k)+noteField(k)+'</div>';});h+=dataFields(phase);if(phase.ph)h+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid #F3F4F6">'+photoBtn(pi)+'</div>';h+='</div>';}
    h+='</div>';
  });

  var xp=xpCalc();
  h+='<div style="margin-top:10px">'+gpsBlock('END — GPS + Timestamp','end','🔴')+'</div>';
  h+='<button class="submit-btn '+(c.scored>0?'submit-on':'submit-off')+'" style="margin-top:12px" '+(c.scored>0?'onclick="showSubmit()"':'')+'>'+(c.scored>0?'Review & Submit · ⚡ '+xp.total+' XP':'Review & Submit')+' ('+c.scored+'/'+c.total+')</button>';
  h+='</div>';
  document.getElementById('app').innerHTML=h;
}

function showSubmit(){
  var c=counted();var pv={O:[],S:[],G:[],F:[]};var items=[];
  PHASES.forEach(function(ph,pi){ph.items.forEach(function(it,ii){var k=pi+'-'+ii;var v=scores[k];if(v!=null){items.push({phase:ph.n,observation:it.t,pillar:it.p,score:v,note:notes[k]||null});pv[it.p].push(v);}});});
  var pillarAvg={};Object.keys(pv).forEach(function(p){var arr=pv[p];pillarAvg[p]=arr.length?+(arr.reduce(function(a,b){return a+b;},0)/arr.length).toFixed(2):null;});
  var xp=xpCalc();
  var isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  var payload={audit_id:'AR-'+CHECKLIST_ID.toUpperCase()+'-'+Date.now().toString(36).toUpperCase(),checklist:CHECKLIST_TITLE,ride:rideName||CHECKLIST_TITLE,park:meta.park,auditor:meta.auditor,gps_start:meta.startTime||null,gps_end:meta.endTime||null,gps_lat:meta.startLat||null,gps_lng:meta.startLng||null,source:isMobile?'mobile':'desktop',pillars:pillarAvg,scored:c.scored,total:c.total,pct:c.pct,data_capture:dataCapture,xp_earned:xp.total,items:items};
  var j=JSON.stringify(payload,null,2);

  // XP breakdown HTML
  var xpHtml='<div style="padding:12px;border-radius:10px;background:linear-gradient(145deg,#0A0F1A,#12141C);margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:10px;font-weight:700;letter-spacing:.08em;color:#64748B;text-transform:uppercase">XP Breakdown</span><span class="mono" style="font-size:18px;font-weight:700;color:#22D87C">⚡ '+xp.total+'</span></div>';
  xp.breakdown.forEach(function(b){xpHtml+='<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-top:1px solid rgba(255,255,255,.05)"><span style="font-size:11px;color:'+(b.bonus?'#FBBF24':'#94A3B8')+'">'+b.label+(b.bonus?' ★':'')+'</span><span class="mono" style="font-size:11px;font-weight:700;color:'+(b.bonus?'#FBBF24':'#22D87C')+'">+'+b.val+'</span></div>';});
  xpHtml+='</div>';

  var ov=document.createElement('div');ov.className='overlay';ov.onclick=function(e){if(e.target===ov)ov.remove();};
  ov.innerHTML='<div class="modal"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div><h3 style="font-size:16px;font-weight:800">'+CHECKLIST_ICON+' Audit Summary</h3><p style="font-size:11px;color:#6B7280;margin-top:2px">'+c.scored+'/'+c.total+' scored · '+(rideName||CHECKLIST_TITLE)+''+(meta.park?' · '+meta.park:'')+'</p></div><button onclick="this.closest(\'.overlay\').remove()" style="border:none;background:#F3F4F6;border-radius:8px;width:32px;height:32px;font-size:16px;cursor:pointer;color:#6B7280">✕</button></div>'+xpHtml+'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">'+['O','S','G','F'].map(function(p){var v=pillarAvg[p];return'<div style="padding:10px;border-radius:8px;background:#F9FAFB;border:1px solid var(--border);text-align:center"><div class="mono" style="font-size:9px;font-weight:700;color:#6B7280">'+P[p].l+'</div><div class="mono" style="font-size:22px;font-weight:800;color:'+(v>=4?'#059669':v>=3?'#CA8A04':v>0?'#DC2626':'#9CA3AF')+'">'+(v?v.toFixed(1):'—')+'</div></div>';}).join('')+'</div><pre class="mono" style="background:#0A0F1A;color:#E2E8F0;padding:14px;border-radius:10px;font-size:9.5px;overflow:auto;white-space:pre-wrap;line-height:1.6;max-height:35vh">'+j.replace(/</g,'&lt;')+'</pre><div style="margin-top:14px;display:flex;gap:8px"><button onclick="navigator.clipboard.writeText(JSON.stringify(window._ap,null,2));this.textContent=\'✓ Copied\';setTimeout(function(){}.bind(this),2000)" style="flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-weight:700;font-size:13px;cursor:pointer">Copy JSON</button><button id="submit-final" onclick="submitAudit(this)" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--ar);color:#0A0C10;font-weight:800;font-size:13px;cursor:pointer">Submit → ⚡ '+xp.total+' XP</button></div></div>';
  window._ap=payload;
  document.body.appendChild(ov);
}

async function submitAudit(btn){
  btn.textContent='Submitting...';btn.disabled=true;
  try{
    var r=await fetch('https://ar-audit.amusementstandards.workers.dev',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(window._ap)
    });
    var d=await r.json();
    if(d.error){btn.textContent='Error: '+d.error;btn.disabled=false;return;}
    btn.textContent='✓ Submitted! +'+d.xpEarned+' XP';
    btn.style.background='#FACC15';
    setTimeout(function(){document.querySelector('.overlay').remove();window.location.href='profile.html';},1500);
  }catch(e){btn.textContent='Network error — try again';btn.disabled=false;}
}

render();
</script></body></html>
